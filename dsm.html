<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimerCo DSM | Pixel Array</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:wght@400;600;900&display=swap');

        :root {
            --brand-bg: #000000;
            
            /* Timer States */
            --time-running: #ffffff;
            --time-warning: #eab308;
            --time-overtime: #ef4444;
            --time-paused: #64748b;
        }

        body { 
            background-color: var(--brand-bg); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Hide scrollbars for full-screen stage use */
        }

        /* Monospace for ticking numbers */
        .font-tech {
            font-family: 'JetBrains Mono', monospace;
            font-variant-numeric: tabular-nums;
        }

        /* State Colors and Glows */
        .stage-display {
            transition: all 0.3s ease;
        }
        .state-running { color: var(--time-running); text-shadow: 0 0 60px rgba(255,255,255,0.1); }
        .state-warning { color: var(--time-warning); text-shadow: 0 0 80px rgba(234,179,8,0.2); }
        .state-overtime { color: var(--time-overtime); text-shadow: 0 0 80px rgba(239,68,68,0.4); animation: pulse-red 2s infinite; }
        .state-paused { color: var(--time-paused); }

        @keyframes pulse-red {
            0%, 100% { background-color: #000000; }
            50% { background-color: #1a0505; }
        }
    </style>
</head>
<body id="app" class="h-screen w-screen flex flex-col items-center justify-center stage-display relative"
      :class="[
          status === 'running' && remainingSeconds <= 0 ? 'state-overtime' : '',
          status === 'running' && remainingSeconds > 0 && remainingSeconds <= 60 ? 'state-warning' : '',
          status === 'running' && remainingSeconds > 60 ? 'state-running' : '',
          status === 'paused' || status === 'stopped' ? 'state-paused' : ''
      ]">

    <!-- Speaker Name (Top) -->
    <div class="absolute top-16 text-[4vw] font-black tracking-widest uppercase opacity-70" style="color: inherit;">
        {{ speakerName || 'WAITING FOR SHOW CALLER...' }}
    </div>

    <!-- Main Time Display -->
    <div class="text-[25vw] font-tech font-bold leading-none tracking-tighter" style="color: inherit;">
        {{ formattedTime }}
    </div>

    <!-- Flashing Message Alert (Bottom) -->
    <div v-if="activeMessage" class="absolute bottom-16 bg-yellow-500 text-black px-12 py-6 rounded-2xl text-[4vw] font-black uppercase tracking-wider shadow-[0_0_50px_rgba(234,179,8,0.5)] animate-bounce text-center max-w-[90%]">
        {{ activeMessage }}
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                // --- FIREBASE PLACEHOLDERS ---
                // Once Firebase is wired in, this endpoint will NOT have control functions.
                // It will exclusively listen for database changes and update these variables.
                
                const status = ref('running'); // Mocked as 'running' for visual test
                const targetTimestamp = ref(Date.now() + (300 * 1000)); // Mocked to 5 minutes
                const pausedRemaining = ref(0);
                const now = ref(Date.now());
                
                const speakerName = ref('Dave Watton'); // Mocked
                const activeMessage = ref(''); // e.g., 'WRAP IT UP!'
                
                let ticker = null;

                // --- LOCAL TIME CALCULATION (Same as Master Control) ---
                const remainingSeconds = computed(() => {
                    if (status.value === 'stopped') return 0;
                    if (status.value === 'paused') return pausedRemaining.value;
                    return Math.ceil((targetTimestamp.value - now.value) / 1000);
                });

                const formattedTime = computed(() => {
                    const totalSecs = remainingSeconds.value;
                    const isNegative = totalSecs < 0;
                    const absSecs = Math.abs(totalSecs);
                    
                    const hours = Math.floor(absSecs / 3600);
                    const minutes = Math.floor((absSecs % 3600) / 60);
                    const seconds = absSecs % 60;

                    let timeStr = '';
                    if (hours > 0) {
                        timeStr = `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    } else {
                        timeStr = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    }

                    return isNegative ? `-${timeStr}` : timeStr;
                });

                // The local ticker to keep the clock butter-smooth
                onMounted(() => {
                    ticker = setInterval(() => {
                        now.value = Date.now();
                    }, 100);
                    
                    /* 
                    FIREBASE LISTENER GOES HERE:
                    db.ref(`events/${eventId}`).on('value', (snapshot) => {
                        const data = snapshot.val();
                        status.value = data.status;
                        targetTimestamp.value = data.targetTimestamp;
                        speakerName.value = data.speakerName;
                        activeMessage.value = data.activeMessage;
                    });
                    */
                });

                onUnmounted(() => {
                    clearInterval(ticker);
                });

                return {
                    status, speakerName, activeMessage, remainingSeconds, formattedTime
                }
            }
        }).mount('#app')
    </script>
</body>
</html>
